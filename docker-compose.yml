services:
  # ── Frontend (React + Vite) ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./postcss.config.js:/app/postcss.config.js
      - ./tsconfig.json:/app/tsconfig.json
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
    environment:
      - NODE_ENV=development
    networks:
      - smartcart-net
    restart: unless-stopped

  # ── Backend (Node.js + Express) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartcart}:${POSTGRES_PASSWORD:-smartcart_secret}@postgres:5432/${POSTGRES_DB:-smartcart}
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartcart-net
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-smartcart}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-smartcart_secret}
      - POSTGRES_DB=${POSTGRES_DB:-smartcart}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartcart}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartcart-net
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartcart-net
    restart: unless-stopped

  # ── AI Service (Python + FastAPI) ────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - ./ai-service:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartcart}:${POSTGRES_PASSWORD:-smartcart_secret}@postgres:5432/${POSTGRES_DB:-smartcart}
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartcart-net
    restart: unless-stopped

  # ── Nginx (Reverse Proxy) ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - smartcart-net
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

# ── Networks ─────────────────────────────────────────────────────
networks:
  smartcart-net:
    driver: bridge
